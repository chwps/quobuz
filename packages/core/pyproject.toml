[project]
name = "quobuz-core"
version = "0.1.0"
description = "Qobuz playlist downloader core library"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27,<1.0",
    "mutagen>=1.47,<2.0",
    "aiofiles>=23.0,<25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quobuz_core"]
